# v2.final-test: 조합 효과 검증 (Stage 2만, bootstrap from v2.0)
# Copy-Paste (v2.A) + Boundary loss (v2.D)
# Usage: uv run python -m src.train --config src/config/v2_final_test.yaml --stage 2

seed: 42
device: cuda

data:
  voc_root: ./data/voc
  coco_root: ./data/coco
  batch_size: 16
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  crop_size: 480
  scale_range: [0.5, 2.0]
  stage: 2
  copy_paste:
    enabled: true
    p: 0.5
    num_paste: [1, 3]
  class_balanced: false

model:
  backbone: resnet50
  head: deeplabv3plus
  num_classes: 21
  output_stride: 16
  pretrained: true
  use_aux: true
  aspp_rates: [6, 12, 18]

loss:
  ignore_index: 255
  dice_weight: 0.5
  lovasz_weight: 0.0
  boundary_weight: 0.5
  boundary_alpha: 5.0
  aux_weight: 0.4

optimizer:
  type: sgd
  base_lr: 0.001
  momentum: 0.9
  weight_decay: 0.0005
  backbone_lr_mult: 0.1

scheduler:
  type: poly
  power: 0.9
  warmup_iters: 500

training:
  stage1_iters: 80000
  stage2_iters: 8000
  stage2_base_lr: 0.001
  stage2_warmup: 500
  log_interval: 50
  val_interval_stage1: 5000
  val_interval_stage2: 1000
  ckpt_interval: 2000
  amp_dtype: fp16
  ema_decay: 0.9999
  grad_clip: 1.0

wandb:
  entity: g1nie-sungkyunkwan-university
  project: osai-p1-local
  run_name_prefix: v2.final-test
  tags: [desktop, voc-only, combination, copy-paste, boundary]

paths:
  bootstrap_from: ./checkpoints/v2.0/best.pth
  ckpt_dir: ./checkpoints/v2.final-test
  training_state: ./checkpoints/v2.final-test/training_state.pth
  best_ckpt: ./checkpoints/v2.final-test/best.pth
  final_ckpt: ./checkpoints/v2.final-test/model.pth
