# Colab v3 Stage 2: MN3-Large + LR-ASPP + Copy-Paste + Boundary loss
# Bootstrap from colab_mn3_s1 best ckpt
# Usage: !uv run python -m src.train --config src/config/colab_mn3_s2.yaml --stage 2

seed: 42

device: cuda

data:
  voc_root: ./data/voc
  coco_root: ./data/coco
  batch_size: 32
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  crop_size: 480
  scale_range: [0.5, 2.0]
  stage: 2
  copy_paste:
    enabled: true
    p: 0.5
    num_paste: [1, 3]

model:
  backbone: mobilenet_v3_large
  head: lraspp
  num_classes: 21
  output_stride: 16
  pretrained: true
  use_aux: false
  lraspp_mid: 64

loss:
  ignore_index: 255
  dice_weight: 0.5
  lovasz_weight: 0.0
  boundary_weight: 0.5
  boundary_alpha: 5.0
  aux_weight: 0.0

optimizer:
  type: sgd
  base_lr: 0.002
  momentum: 0.9
  weight_decay: 0.0001
  backbone_lr_mult: 0.1

scheduler:
  type: poly
  power: 0.9
  warmup_iters: 500

training:
  stage1_iters: 160000
  stage2_iters: 8000
  stage2_base_lr: 0.002
  stage2_warmup: 500
  log_interval: 50
  val_interval_stage1: 5000
  val_interval_stage2: 1000
  ckpt_interval: 2000
  amp_dtype: fp16
  ema_decay: 0.9999
  grad_clip: 1.0

wandb:
  entity: g1nie-sungkyunkwan-university
  project: osai-p1-colab
  run_name_prefix: colab-mn3-s2
  tags: [colab, voc-only, mn3, lraspp, stage2, copy-paste, boundary, a100]

paths:
  bootstrap_from: /content/drive/MyDrive/osai/p1/checkpoints_mn3/s1/best.pth
  ckpt_dir: /content/drive/MyDrive/osai/p1/checkpoints_mn3/s2
  training_state: /content/drive/MyDrive/osai/p1/checkpoints_mn3/s2/training_state.pth
  best_ckpt: /content/drive/MyDrive/osai/p1/checkpoints_mn3/s2/best.pth
  final_ckpt: /content/drive/MyDrive/osai/p1/checkpoints_mn3/s2/model.pth
