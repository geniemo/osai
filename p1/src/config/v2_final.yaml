# v2.final-full: Copy-Paste + Boundary loss (both stages, from scratch)
# Stage 1: COCO+VOC mixed, 160K iter
# Stage 2: VOC train only, 8K iter
# Usage: uv run python -m src.train --config src/config/v2_final.yaml  (stage 1+2 sequential)

seed: 42
device: cuda

data:
  voc_root: ./data/voc
  coco_root: ./data/coco
  batch_size: 16
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  crop_size: 480
  scale_range: [0.5, 2.0]
  stage: 1
  copy_paste:
    enabled: true
    p: 0.5
    num_paste: [1, 3]
  class_balanced: false

model:
  backbone: resnet50
  head: deeplabv3plus
  num_classes: 21
  output_stride: 16
  pretrained: true
  use_aux: true
  aspp_rates: [6, 12, 18]

loss:
  ignore_index: 255
  dice_weight: 0.5
  lovasz_weight: 0.0
  boundary_weight: 0.5
  boundary_alpha: 5.0
  aux_weight: 0.4

optimizer:
  type: sgd
  base_lr: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  backbone_lr_mult: 0.1

scheduler:
  type: poly
  power: 0.9
  warmup_iters: 1000

training:
  stage1_iters: 160000
  stage2_iters: 8000
  stage2_base_lr: 0.001
  stage2_warmup: 500
  log_interval: 50
  val_interval_stage1: 5000
  val_interval_stage2: 1000
  ckpt_interval: 5000
  amp_dtype: fp16
  ema_decay: 0.9999
  grad_clip: 1.0

wandb:
  entity: g1nie-sungkyunkwan-university
  project: osai-p1-local
  run_name_prefix: v2.final
  tags: [desktop, voc-coco, final, copy-paste, boundary]

paths:
  ckpt_dir: ./checkpoints/v2.final
  training_state: ./checkpoints/v2.final/training_state.pth
  best_ckpt: ./checkpoints/v2.final/best.pth
  final_ckpt: ./checkpoints/v2.final/model.pth
