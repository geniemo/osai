# v2.0 ablation: Stage 1 80K → 160K (다른 모든 것 default.yaml과 동일)
# 가설: COCO pretraining 더 길게 → +1~2% mIoU 기대
# Training time: ~11h (Stage 1 160K) + ~0.5h (Stage 2 8K) = ~11.5h
# Usage: uv run python -m src.train --config src/config/v2_0_stage1_160k.yaml

seed: 42

device: cuda

data:
  voc_root: ./data/voc
  coco_root: ./data/coco
  batch_size: 16
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  crop_size: 480
  scale_range: [0.5, 2.0]
  stage: 1

model:
  backbone: resnet50
  head: deeplabv3plus
  num_classes: 21
  output_stride: 16
  pretrained: true
  use_aux: true
  aspp_rates: [6, 12, 18]

loss:
  ignore_index: 255
  dice_weight: 0.5
  aux_weight: 0.4

optimizer:
  type: sgd
  base_lr: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  backbone_lr_mult: 0.1

scheduler:
  type: poly
  power: 0.9
  warmup_iters: 1000

training:
  # ★ 변경: stage1_iters 80K → 160K
  # poly LR이 160K에서 0이 되도록 자동 (slower decay = 더 많이 학습)
  stage1_iters: 160000
  stage2_iters: 8000
  stage2_base_lr: 0.001
  stage2_warmup: 500
  log_interval: 50
  val_interval_stage1: 5000          # 32 val runs total
  val_interval_stage2: 1000
  ckpt_interval: 5000
  amp_dtype: fp16
  ema_decay: 0.9999
  grad_clip: 1.0

wandb:
  entity: g1nie-sungkyunkwan-university
  project: osai-p1-local
  run_name_prefix: v2.0
  tags: [desktop, voc+coco, ablation, v2.0, stage1-160k]

paths:
  # v1 baseline ckpt와 분리 (./checkpoints/v2.0/)
  ckpt_dir: ./checkpoints/v2.0
  training_state: ./checkpoints/v2.0/training_state.pth
  best_ckpt: ./checkpoints/v2.0/best.pth
  final_ckpt: ./checkpoints/v2.0/model.pth
