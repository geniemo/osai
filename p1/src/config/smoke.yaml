# Smoke config: 50 iter, tiny batch — pipeline plumbing verification only
# Usage: uv run python -m src.train --config src/config/smoke.yaml --stage 2

seed: 42

device: cuda

data:
  voc_root: ./data/voc
  coco_root: ./data/coco
  batch_size: 2
  num_workers: 2
  pin_memory: true
  persistent_workers: false
  crop_size: 256
  scale_range: [0.75, 1.5]
  stage: 2

model:
  backbone: resnet50
  head: deeplabv3plus
  num_classes: 21
  output_stride: 16
  pretrained: true
  use_aux: true
  aspp_rates: [6, 12, 18]

loss:
  ignore_index: 255
  dice_weight: 0.5
  aux_weight: 0.4

optimizer:
  type: sgd
  base_lr: 0.001
  momentum: 0.9
  weight_decay: 0.0005
  backbone_lr_mult: 0.1

scheduler:
  type: poly
  power: 0.9
  warmup_iters: 5

training:
  stage1_iters: 50
  stage2_iters: 50
  stage2_base_lr: 0.001
  stage2_warmup: 5
  log_interval: 10
  val_interval_stage1: 50
  val_interval_stage2: 25
  ckpt_interval: 25
  amp_dtype: fp16
  ema_decay: 0.99
  grad_clip: 1.0

wandb:
  entity: g1nie-sungkyunkwan-university
  project: osai-p1-local
  run_name_prefix: smoke
  tags: [smoke]

paths:
  ckpt_dir: ./checkpoints/smoke
  training_state: ./checkpoints/smoke/training_state.pth
  best_ckpt: ./checkpoints/smoke/best.pth
  final_ckpt: ./checkpoints/smoke/model.pth
