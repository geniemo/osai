# Colab v2.final Stage 1: vanilla training (= v2.0 equivalent), 160K iter
# COCO+VOC mixed, NO Copy-Paste, NO Boundary loss
# 출력 ckpt가 Stage 2 (colab_v2_final_s2.yaml)에서 bootstrap됨
# Usage (Colab cell):
#   !uv run python -m src.train --config src/config/colab_v2_final_s1.yaml --stage 1

seed: 42

device: cuda

data:
  voc_root: ./data/voc
  coco_root: ./data/coco
  batch_size: 16
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  crop_size: 480
  scale_range: [0.5, 2.0]
  stage: 1

model:
  backbone: resnet50
  head: deeplabv3plus
  num_classes: 21
  output_stride: 16
  pretrained: true
  use_aux: true
  aspp_rates: [6, 12, 18]

loss:
  ignore_index: 255
  dice_weight: 0.5
  aux_weight: 0.4

optimizer:
  type: sgd
  base_lr: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  backbone_lr_mult: 0.1

scheduler:
  type: poly
  power: 0.9
  warmup_iters: 1000

training:
  stage1_iters: 160000
  stage2_iters: 8000
  stage2_base_lr: 0.001
  stage2_warmup: 500
  log_interval: 50
  val_interval_stage1: 5000
  val_interval_stage2: 1000
  ckpt_interval: 5000
  amp_dtype: fp16
  ema_decay: 0.9999
  grad_clip: 1.0

wandb:
  entity: g1nie-sungkyunkwan-university
  project: osai-p1-colab
  run_name_prefix: colab-v2.final-s1
  tags: [colab, voc+coco, final, stage1]

paths:
  ckpt_dir: /content/drive/MyDrive/osai/p1/checkpoints_v2_final/s1
  training_state: /content/drive/MyDrive/osai/p1/checkpoints_v2_final/s1/training_state.pth
  best_ckpt: /content/drive/MyDrive/osai/p1/checkpoints_v2_final/s1/best.pth
  final_ckpt: /content/drive/MyDrive/osai/p1/checkpoints_v2_final/s1/model.pth
