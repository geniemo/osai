# Default config: B (ResNet-50 + DeepLabV3+, OS=16)

seed: 42

device: cuda

data:
  voc_root: ./data/voc
  coco_root: ./data/coco
  batch_size: 16
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  crop_size: 480
  scale_range: [0.5, 2.0]
  stage: 1

model:
  backbone: resnet50
  head: deeplabv3plus
  num_classes: 21
  output_stride: 16
  pretrained: true
  use_aux: true
  aspp_rates: [6, 12, 18]

loss:
  ignore_index: 255
  dice_weight: 0.5
  aux_weight: 0.4

optimizer:
  type: sgd
  base_lr: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  backbone_lr_mult: 0.1

scheduler:
  type: poly
  power: 0.9
  warmup_iters: 1000

training:
  # SBD 미사용 (PDF 정책 준수). VOC train만 1,464장 → Stage 2 iter 축소 필요.
  # Stage 1 (COCO 95K + VOC 1.4K): 80K iter ≈ 13 epoch
  # Stage 2 (VOC 1.4K only): 8K iter ≈ 88 epoch — 적정 finetune 범위
  stage1_iters: 80000
  stage2_iters: 8000
  stage2_base_lr: 0.001
  stage2_warmup: 500
  log_interval: 50
  val_interval_stage1: 5000
  val_interval_stage2: 1000
  ckpt_interval: 5000
  amp_dtype: fp16
  ema_decay: 0.9999
  grad_clip: 1.0

wandb:
  entity: g1nie-sungkyunkwan-university
  project: osai-p1-local
  run_name_prefix: dev
  tags: [desktop, voc+coco]

paths:
  ckpt_dir: ./checkpoints
  training_state: ./checkpoints/training_state.pth
  best_ckpt: ./checkpoints/best.pth
  final_ckpt: ./checkpoints/model.pth
